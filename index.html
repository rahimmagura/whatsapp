<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Store System</title>

<style>
body{
  font-family: Arial;
  background:#f4f4f4;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:95%;
  max-width:400px;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
}

button{
  width:100%;
  padding:10px;
  margin-top:5px;
}

.insert{background:green;color:white;}
.check{background:blue;color:white;}
.delete{background:red;color:white;}
.download{background:black;color:white;}

#result{
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<h3>Store System</h3>

<input id="mobile" placeholder="Mobile Number">
<input id="email" placeholder="Email">

<button class="insert" onclick="insertData()">Insert</button>
<button class="check" onclick="checkData()">Check</button>
<button class="delete" onclick="deleteData()">Delete</button>
<button class="download" onclick="downloadPDF()">Download PDF</button>

<div id="result"></div>

</div>

<script>

function getData(){
  return {
    mobile: document.getElementById("mobile").value,
    email: document.getElementById("email").value
  };
}

// INSERT
async function insertData(){
  let data = getData();

  let res = await fetch('/insert',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });

  let out = await res.json();
  document.getElementById("result").innerText = out.message;
}

// CHECK
async function checkData(){
  let value = document.getElementById("mobile").value || document.getElementById("email").value;

  let res = await fetch('/check',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({value})
  });

  let out = await res.json();

  if(out.found){
    document.getElementById("result").innerText =
    `Found ✅ Mobile: ${out.data.mobile} | Email: ${out.data.email}`;
  } else {
    document.getElementById("result").innerText = "Not Found ❌";
  }
}

// DELETE
async function deleteData(){
  let value = document.getElementById("mobile").value || document.getElementById("email").value;

  let res = await fetch('/delete',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({value})
  });

  let out = await res.json();

  if(out.deleted){
    document.getElementById("result").innerText =
    `Deleted 🗑 Mobile: ${out.deleted.mobile} | Email: ${out.deleted.email}`;
  } else {
    document.getElementById("result").innerText = out.message;
  }
}

// DOWNLOAD
function downloadPDF(){
  window.location.href = "/download";
}

</script>

</body>
</html>
