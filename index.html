<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box{
  width:95%;
  max-width:400px;
  background:white;
  padding:20px;
  border-radius:12px;
}
input{
  width:100%;
  padding:10px;
  margin:5px 0;
}
button{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  color:white;
  border-radius:6px;
}
.insert{background:green;}
.check{background:blue;}
.delete{background:red;}
.download{background:black;}

.spinner{
  border:4px solid #eee;
  border-top:4px solid blue;
  border-radius:50%;
  width:18px;
  height:18px;
  animation:spin 1s linear infinite;
  display:none;
  margin:10px auto;
}
@keyframes spin{100%{transform:rotate(360deg);}}
</style>
</head>

<body>

<div class="box">

<h3>Store System</h3>

<input id="mobile" placeholder="Mobile Number">
<input id="email" placeholder="Email">

<button class="insert" onclick="insertData()">Insert</button>
<button class="check" onclick="checkData()">Check</button>
<button class="delete" onclick="deleteData()">Delete</button>
<button class="download" onclick="downloadPDF()">Download PDF</button>

<div class="spinner" id="spinner"></div>
<div id="result"></div>

</div>

<script>
function show(){spinner.style.display="block";}
function hide(){spinner.style.display="none";}
function reset(){mobile.value="";email.value="";}

// INSERT
async function insertData(){
  show();
  let res = await fetch('/insert',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({mobile: mobile.value, email: email.value})
  });
  let out = await res.json();
  hide();
  result.innerText = out.message;
  reset();
}

// CHECK
async function checkData(){
  show();
  let value = mobile.value || email.value;
  let res = await fetch('/check',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({value})
  });
  let out = await res.json();
  hide();
  result.innerText = out.found
    ? `Found ✅ ${out.data.mobile} | ${out.data.email}`
    : "Not Found ❌";
  reset();
}

// DELETE
async function deleteData(){
  show();
  let value = mobile.value || email.value;
  let res = await fetch('/delete',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({value})
  });
  let out = await res.json();
  hide();
  result.innerText = out.deleted
    ? `Deleted 🗑 ${out.deleted.mobile} | ${out.deleted.email}`
    : out.message;
  reset();
}

// PDF
function downloadPDF(){
  window.location.href = "/download-pdf";
}
</script>

</body>
</html>
